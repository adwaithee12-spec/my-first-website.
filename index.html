<body>

<div class="container">
    <h1>🍳 What's In My Fridge?</h1>

    <p>Enter ingredients separated by commas:</p>

    <input id="ingredientInput" placeholder="egg, cheese">
    <button onclick="findRecipes()">Search</button>

    <div id="results"></div>

</div>

<script>
const mockDatabase = [
{
title: "Classic Omelette",
ingredients: ["egg","cheese"],
instructions: "Beat eggs, pour into pan, add cheese, fold."
},
{
title: "Tomato Egg Scramble",
ingredients: ["egg","tomato"],
instructions: "Chop tomatoes. Scramble eggs and mix."
},
{
title: "Spinach Salad",
ingredients: ["spinach","tomato"],
instructions: "Mix spinach and tomato."
},
{
title: "The Ultimate Breakfast",
ingredients: ["egg","cheese","spinach"],
instructions: "Cook spinach, add eggs, top with cheese."
},
{
title: "The Legendary Sambar",
ingredients: ["toor dal","drumsticks","ash gourd","pumpkin","carrots","okra","eggplant","shallots","tomato","tamarind"],
instructions: "Cook dal, boil vegetables, add tamarind, mix and temper."
},
{
title: "Kerala Style Nadan Avial",
ingredients: ["carrot","raw banana","plantain","drumstick","ash gourd","pumpkin","cucumber"],
instructions: "Cook vegetables, add coconut mixture, finish with yogurt and coconut oil."
},
{
title: "Soya Chunks Fry",
ingredients: ["soya chunks","onion","green chili","oil","salt"],
instructions: "Boil soya chunks, fry with spices and onions until crispy."
}
];

function findRecipes() {

const input = document
.getElementById("ingredientInput")
.value
.toLowerCase()
.trim();

const resultsDiv = document.getElementById("results");

if(input === "") {
    resultsDiv.innerHTML = "<p>Please enter ingredients.</p>";
    return;
}

const userIngredients = input
.split(",")
.map(item => item.trim());

const matches = mockDatabase.filter(recipe =>
    userIngredients.every(ingredient =>
        recipe.ingredients.includes(ingredient)
    )
);

if(matches.length === 0){
    resultsDiv.innerHTML =
    "<p>No recipes found.</p>";
    return;
}

resultsDiv.innerHTML = matches.map(recipe => `
<div class="recipe">
<h3>${recipe.title}</h3>
<p><strong>Ingredients:</strong>
${recipe.ingredients.join(", ")}</p>
<p><strong>Instructions:</strong>
${recipe.instructions}</p>
</div>
`).join("");
}
</script>
